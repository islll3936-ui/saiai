<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multi Timezone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Global Digital Clock</h1>
            <p class="subtitle">Real-time display across multiple time zones</p>
        </header>

        <div class="controls">
            <input type="text" id="timezoneInput" placeholder="Add timezone (e.g., America/New_York)" />
            <button id="addTimezoneBtn">Add Timezone</button>
            <button id="resetBtn">Reset to Default</button>
        </div>

        <div class="timezone-list" id="timezoneList"></div>

        <div class="timezone-suggestions">
            <h3>Popular Timezones:</h3>
            <div class="suggestions-grid">
                <button class="suggestion-btn" data-tz="America/New_York">New York (EST)</button>
                <button class="suggestion-btn" data-tz="Europe/London">London (GMT)</button>
                <button class="suggestion-btn" data-tz="Europe/Paris">Paris (CET)</button>
                <button class="suggestion-btn" data-tz="Asia/Tokyo">Tokyo (JST)</button>
                <button class="suggestion-btn" data-tz="Asia/Bangkok">Bangkok (ICT)</button>
                <button class="suggestion-btn" data-tz="Australia/Sydney">Sydney (AEDT)</button>
                <button class="suggestion-btn" data-tz="Asia/Dubai">Dubai (GST)</button>
                <button class="suggestion-btn" data-tz="America/Los_Angeles">Los Angeles (PST)</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
